apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shopwise-ingress
  namespace: shopwise
  annotations:
    # These annotations tell the ALB controller how to configure the ALB
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

    # Health check configuration
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "10"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"

    # Place ALB in public subnets
    alb.ingress.kubernetes.io/subnets: REPLACE_WITH_PUBLIC_SUBNET_IDS

    # Security group for ALB — allow HTTP from internet
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'

    # Tags for cost tracking
    alb.ingress.kubernetes.io/tags: Project=shopwise,Environment=dev,ManagedBy=k8s
spec:
  rules:
    - http:
        paths:
          # API traffic goes to backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5000
          # Health check endpoint
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
          # All other traffic goes to frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80

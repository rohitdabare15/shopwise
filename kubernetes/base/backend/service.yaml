apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: shopwise
  labels:
    app: backend
spec:
  # ClusterIP = internal only, reachable within the cluster
  # This is how the frontend Nginx proxies to /api/
  type: ClusterIP
  selector:
    app: backend              # Routes to pods with this label
  ports:
    - name: http
      port: 5000              # Port the service listens on
      targetPort: 5000        # Port on the pod to forward to
      protocol: TCP

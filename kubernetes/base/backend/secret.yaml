apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: shopwise
type: Opaque
stringData:
  # We fetch the real password from Secrets Manager and inject it here
  # This file is a TEMPLATE — the actual value is filled by the deploy script
  # Never commit a real password in this file
  DB_PASSWORD: "PLACEHOLDER_REPLACED_AT_DEPLOY_TIME"
  SECRET_KEY: "PLACEHOLDER_REPLACED_AT_DEPLOY_TIME"

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: shopwise
  labels:
    app: backend
    version: v1.0.0
spec:
  replicas: 2                   # Start with 2 — HPA will adjust
  selector:
    matchLabels:
      app: backend              # Must match template labels below

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1               # Create 1 extra pod before killing old ones
      maxUnavailable: 0         # Never have fewer than desired replicas during update
                                # = zero-downtime deployments

  template:
    metadata:
      labels:
        app: backend
        version: v1.0.0
      annotations:
        # Prometheus will scrape metrics from this pod on port 5000
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      # ServiceAccount links this pod to the IRSA role (Phase 5)
      # The pod gets AWS credentials automatically via OIDC
      serviceAccountName: backend-sa

      # Init container runs before the main container starts
      # Ensures DB tables exist before Flask tries to query them
      initContainers:
        - name: db-migrate
          image: BACKEND_IMAGE_URL:latest   # Replaced by deploy script
          command: ["python", "-c"]
          args:
            - |
              from app import create_app, db
              app = create_app()
              with app.app_context():
                  db.create_all()
                  print('Database tables ready')
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret

      containers:
        - name: backend
          image: BACKEND_IMAGE_URL:latest   # Replaced by deploy script
          ports:
            - containerPort: 5000
              name: http

          # Pull env vars from ConfigMap and Secret
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret

          # Resource limits — prevent one pod consuming all node resources
          resources:
            requests:
              memory: "128Mi"   # Kubernetes reserves this much on the node
              cpu: "100m"       # 100 millicores = 0.1 CPU core
            limits:
              memory: "256Mi"   # Pod is killed if it exceeds this
              cpu: "500m"       # Pod is throttled if it exceeds this

          # Liveness probe — if this fails, Kubernetes restarts the pod
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30   # Wait 30s before first check (app startup time)
            periodSeconds: 30
            failureThreshold: 3

          # Readiness probe — if this fails, pod is removed from load balancer
          # but NOT restarted. Used during rolling updates.
          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

      # Spread pods across different nodes for resilience
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [backend]
                topologyKey: kubernetes.io/hostname
